name: Fuzz

# Daily fuzz run for the cargo-fuzz harness under fuzz/. Single
# cross-decode target gets the full 30-minute budget. The harness
# dlopens libjxl at runtime via libloading; the CI runner needs
# `libjxl-dev` so it actually validates instead of silently skipping.

on:
  schedule:
    - cron: "57 5 * * *"   # daily 05:57 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      extra_packages_apt: "libjxl-dev"
      time_budget_seconds: 1800
    secrets: inherit
