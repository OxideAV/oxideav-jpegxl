[package]
name = "oxideav-jpegxl"
version = "0.0.5"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/OxideAV/oxideav-jpegxl"
authors = ["Mark Karpeles"]
description = "Pure-Rust JPEG XL (JXL) codec — signature + container detection, SizeHeader + partial ImageMetadata parsing, plus Modular sub-bitstream channel decode (ABRAC + BEGABRAC + MA-tree + named predictors per the 2019 committee draft); full whole-image decode pending FrameHeader/TOC wiring"

readme = "README.md"
homepage = "https://github.com/OxideAV/oxideav-jpegxl"
keywords = ["multimedia", "image", "jpegxl", "jxl", "codec"]
categories = ["multimedia::encoding", "multimedia::images"]

[dependencies]
oxideav-core = "0.1"
